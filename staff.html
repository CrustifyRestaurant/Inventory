    <style>
        :root { 
            --red: #8b0000; 
            --orange: #f37021; 
            --dark-orange: #b34e12; 
            --navy: #0F172A; 
            --bg: #f8fafc; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); 
            color: #333; 
            overflow: hidden; 
            font-style: normal !important;
        }

        * { font-style: normal !important; }

        .btn-3d { 
            transition: transform 0.1s, box-shadow 0.1s; 
            cursor: pointer; 
            border: none; 
            position: relative; 
            user-select: none; 
        }
        
        .btn-3d:active { 
            transform: translateY(4px) !important; 
            box-shadow: 0 2px 0px rgba(0,0,0,0.2) !important; 
        }

        .btn-3d:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .sidebar-active { 
            background: var(--orange) !important; 
            color: white !important; 
            box-shadow: 0 8px 20px rgba(243, 112, 33, 0.4); 
            border-radius: 15px; 
        }

        .admin-sidebar { 
            background: var(--red); 
            border-right: 6px solid var(--orange); 
        }

        .glass-bubble { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(25px); 
            max-height: 90vh; 
            overflow-y: auto; 
            border-radius: 35px; 
            border: 4px solid var(--orange); 
        }

        .kiosk-card { 
            background: white; 
            border-radius: 35px; 
            box-shadow: 0 20px 0px #eee; 
            border: 3px solid #fff; 
        }

        @keyframes pulse-live { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.3; } 
        }
        
        .live-dot { animation: pulse-live 1.5s infinite; }

        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* PIN shake animation for wrong entry */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-10px); }
            30% { transform: translateX(10px); }
            45% { transform: translateX(-8px); }
            60% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
            90% { transform: translateX(4px); }
        }
        .pin-shake { animation: shake 0.5s ease-in-out; }
        .pin-error { border-color: #ef4444 !important; background: #fef2f2 !important; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Loading spinner for async actions */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { 
            display: inline-block; 
            width: 20px; height: 20px; 
            border: 3px solid rgba(255,255,255,0.3); 
            border-top-color: white; 
            border-radius: 50%; 
            animation: spin 0.7s linear infinite; 
        }

    .text-5xl { font-size: 28px !important; }

    .max-w-sm, .max-w-md, .max-w-lg { max-width: 92vw !important; }
}

        // --- LIVE SHIFT ENGINE ---
        const LiveShiftEngine = ({ startTime, dailyRate }) => {
            const [seconds, setSeconds] = useState(0);
            
            useEffect(() => {
                const tick = () => {
                    const diff = Math.max(0, Math.floor((new Date() - new Date(startTime)) / 1000));
                    setSeconds(diff);
                };
                tick(); 
                const i = setInterval(tick, 1000); 
                return () => clearInterval(i);
            }, [startTime]);

            const h = Math.floor(seconds / 3600); 
            const m = Math.floor((seconds % 3600) / 60); 
            const s = seconds % 60;
            const liveMoney = calcEarnings(seconds, dailyRate);

            // FIX: Show "Day 2" indicator if shift spans past midnight into next day
            const shiftStartDate = new Date(startTime).toDateString();
            const nowDate = new Date().toDateString();
            const isNextDay = shiftStartDate !== nowDate;

        // --- VISUAL INTELLIGENCE CHARTS ---
        const VisualIntelligence = ({ logs, totalStaff }) => {
            const lineRef = useRef(null);
            const doughRef = useRef(null);
            const charts = useRef({ line: null, dough: null });

            // Compute chart data only from logs (stable — not currentTime-driven)
            const chartData = useMemo(() => {
                const labels = [...Array(7)].map((_, i) => {
                    const d = new Date(); d.setDate(d.getDate() - (6 - i));
                    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                });
                const todayLabel = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                const costPoints = labels.map(label => {
                    const isToday = label === todayLabel;
                    return logs
                        .filter(l => new Date(l.check_in).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) === label)
                        .reduce((sum, log) => {
                            const start = new Date(log.check_in);
                            // Closed shifts: use actual checkout. Live shifts on today: use now (snapshot).
                            // Live shifts on past days: cap at midnight of that day.
                            let end;
                            if (log.check_out) {
                                end = new Date(log.check_out);
                            } else if (isToday) {
                                end = new Date();
                            } else {
                                end = new Date(start);

        // --- MAIN APP ---
        const App = () => {

const [creditModal, setCreditModal] = useState(null); // { employee, type: 'loan'|'repayment' }
const [creditAmount, setCreditAmount] = useState('');
const [creditNote, setCreditNote] = useState('');
            // FIX: recentEdits now stores timestamps AND auto-prunes entries older than 60s

            // FIX: Auto-checkout — use a ref-based flag so it only runs once per minute

const [endH, endM] = prof.shift_end.split(':').map(Number);

// Use local date components to avoid UTC+5 offset bug
let autoEnd = new Date(

);

// If shift_end (2am) is before or equal to check_in local time, roll to next day
if (autoEnd.getTime() <= checkIn.getTime()) {

}

};

            // --- AUTH ---

                    const assertion = await navigator.credentials.get({ publicKey: { challenge, userVerification: "required" } });
                    if (!assertion) return;
                    const credIdB64 = bufferToBase64(assertion.rawId);
                    const { data: user, error } = await sb.from('profiles').select('*').eq('fingerprint_id', credIdB64).single();
                    if (error || !user) { 
                        playSfx('error'); 
                        showToast('Fingerprint not recognized', 'error');

                    const { data: session } = await sb.from('attendance').select('*').eq('employee_id', user.id).is('check_out', null).single();
                    setEmployee({ ...user, currentShift: session });

                    playSfx('pop');
                    const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
                    const createOptions = {
                        publicKey: {
                            challenge,
                            rp: { name: "Crustify System" },
                            user: { id: strToBuffer(user.id), name: user.display_id, displayName: user.full_name },
                            pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
                            authenticatorSelection: { authenticatorAttachment: "platform", residentKey: "required", userVerification: "required" },
                            timeout: 60000
                        }
                    };
                    const credential = await navigator.credentials.create(createOptions);
                    const credIdB64 = bufferToBase64(credential.rawId);
                    const { error } = await sb.from('profiles').update({ fingerprint_id: credIdB64 }).eq('id', user.id);
                    if (error) { showToast('Failed to save fingerprint', 'error'); return; }

                            <td className="px-8 py-6">{c.profiles?.full_name}{c.note && <p className="text-[9px] text-slate-400 mt-1">{c.note}</p>}</td>
                            <td className="px-8 py-6 font-mono text-[11px]">{new Date(c.created_at).toLocaleString()}</td>
                            <td className="px-8 py-6 text-center">
                                <span className={`px-4 py-2 rounded-xl text-[9px] ${c.amount > 0 ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>{c.amount > 0 ? 'LOAN' : 'REPAYMENT'}</span>
                            </td>
                            <td className={`px-8 py-6 text-right text-lg ${c.amount > 0 ? 'text-red-600' : 'text-emerald-600'}`}>{c.amount > 0 ? '+' : ''}Rs. {c.amount.toLocaleString()}</td>
                        </tr>
                    ))}
                </tbody>
            </table>
        </div>
    </div>
)}
                                </main>
                            </React.Fragment>
                        )}
                    </div>

                    {/* REGISTER STAFF MODAL */}
                    {isStaffModal && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-xl z-[200] flex items-center justify-center p-6 animate-fade uppercase font-black">
                            <div className="glass-bubble p-12 rounded-[4rem] w-full max-w-md shadow-2xl">
                                <h3 className="text-3xl font-black mb-8 text-[#8b0000] uppercase">Register Staff</h3>
                                <div className="space-y-6 text-left">
                                    <div className="space-y-1"><label className="text-[9px] ml-4 font-black text-slate-400">LEGAL NAME</label><input placeholder="Staff Full Name" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] font-black outline-none border-slate-100 focus:border-[#f37021]" value={newStaff.name} onChange={e => setNewStaff({...newStaff, name: e.target.value})} /></div>
                                    <div className="space-y-1"><label className="text-[9px] ml-4 font-black text-slate-400">PIN ID</label><input placeholder="Numeric ID (4 digits)" maxLength={4} className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] font-mono font-black outline-none border-slate-100 focus:border-[#f37021]" value={newStaff.id} onChange={e => setNewStaff({...newStaff, id: e.target.value})} /></div>
                                    <div className="space-y-1"><label className="text-[9px] ml-4 font-black text-slate-400">PAYOUT RATE (10H)</label><input placeholder="PKR Value (for a full 10h shift)" type="number" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] font-black outline-none border-slate-100 focus:border-[#f37021]" value={newStaff.rate} onChange={e => setNewStaff({...newStaff, rate: e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1 font-black"><label className="text-[9px] ml-4 text-slate-400 uppercase">Start Time</label><input type="time" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] outline-none font-black" value={newStaff.shift_start} onChange={e => setNewStaff({...newStaff, shift_start: e.target.value})} /></div>
                                        <div className="space-y-1 font-black"><label className="text-[9px] ml-4 text-slate-400 uppercase">End Time</label><input type="time" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] outline-none font-black" value={newStaff.shift_end} onChange={e => setNewStaff({...newStaff, shift_end: e.target.value})} /></div>
                                    </div>
                                    <p className="text-[9px] text-slate-400 ml-4">Hourly rate = Payout ÷ 10. Example: Rs. 2000 for 10h = Rs. 200/hr</p>
                                    <div className="flex gap-4 pt-6 font-black">
                                        <button onClick={() => setIsStaffModal(false)} className="flex-1 text-slate-400 uppercase text-xs uppercase tracking-widest">Cancel</button>
                                        <button onClick={async () => {
                                            if (!newStaff.name || !newStaff.id || !newStaff.rate) { showToast('Fill all required fields', 'error'); return; }
                                            const { error } = await sb.from('profiles').insert([{ full_name: newStaff.name, display_id: newStaff.id, daily_rate: newStaff.rate, shift_start: newStaff.shift_start, shift_end: newStaff.shift_end, is_active: true }]);
                                            if (error) { showToast('Failed to register: ' + error.message, 'error'); return; }
                                            refreshData();
                                            setIsStaffModal(false);
                                            setNewStaff({ name: '', id: '', rate: '', shift_start: '', shift_end: '' });
                                            showToast(`${newStaff.name} registered!`, 'success');
                                            playSfx('success');
                                        }} className="flex-1 py-6 bg-[#f37021] text-white font-black rounded-[2rem] btn-3d shadow-[0_6px_0_#b34e12] uppercase text-xs tracking-widest">Activate</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EDIT STAFF MODAL */}
                    {editStaff && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-xl z-[200] flex items-center justify-center p-6 animate-fade uppercase font-black">
                            <div className="glass-bubble p-12 rounded-[4rem] w-full max-w-md shadow-2xl">
                                <h3 className="text-3xl font-black mb-8 text-[#8b0000] uppercase">Update Profile</h3>
                                <div className="space-y-6 text-left font-black">
                                    <div className="space-y-1"><label className="text-[9px] ml-4 text-slate-400">FULL NAME</label><input className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] font-black outline-none" value={editStaff.full_name} onChange={e => setEditStaff({...editStaff, full_name: e.target.value})} /></div>
                                    <div className="space-y-1"><label className="text-[9px] ml-4 text-slate-400">PAYOUT RATE (10H PKR)</label><input type="number" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] font-black outline-none" value={editStaff.daily_rate || ''} onChange={e => setEditStaff({...editStaff, daily_rate: e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[9px] ml-4 text-slate-400 uppercase">Shift Start</label><input type="time" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] outline-none font-black" value={editStaff.shift_start || ''} onChange={e => setEditStaff({...editStaff, shift_start: e.target.value})} /></div>
                                        <div className="space-y-1"><label className="text-[9px] ml-4 text-slate-400 uppercase">Shift End</label><input type="time" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] outline-none font-black" value={editStaff.shift_end || ''} onChange={e => setEditStaff({...editStaff, shift_end: e.target.value})} /></div>
                                    </div>
                                    <div className="flex gap-4 pt-6 font-black">
                                        <button onClick={() => setEditStaff(null)} className="flex-1 text-slate-400 uppercase text-xs">Cancel</button>
                                        <button onClick={async () => {
                                            const { error } = await sb.from('profiles').update({ full_name: editStaff.full_name, shift_start: editStaff.shift_start, shift_end: editStaff.shift_end, daily_rate: editStaff.daily_rate }).eq('id', editStaff.id);
                                            if (error) { showToast('Failed to update profile', 'error'); return; }
                                            setEditStaff(null);
                                            showToast('Profile updated', 'success');
                                            playSfx('success');
                                        }} className="flex-1 py-6 bg-indigo-600 text-white font-black rounded-[2rem] btn-3d shadow-[0_6px_0_#3730a3] uppercase text-xs">Save Changes</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EXTRA HOURS MODAL — extends checkout of a specific log record */}
                    {extraHoursModal && (() => {
                        // extraHoursModal is a log record (has check_in, check_out, profiles)
                        const log = extraHoursModal;
                        const staffName = log.profiles?.full_name || 'Unknown';
                        const dailyRate = log.profiles?.daily_rate || 0;
                        // Current checkout: if live use now, else use recorded checkout
                        const currentCheckout = log.check_out ? new Date(log.check_out) : new Date();
                        const extraSecs = ((parseFloat(extraHours)||0)*3600) + ((parseFloat(extraMinutes)||0)*60);
                        const newCheckout = extraSecs > 0 ? new Date(currentCheckout.getTime() + extraSecs*1000) : null;
                        const extraPay = calcEarnings(extraSecs, dailyRate);

                        return (
                            <div className="fixed inset-0 bg-black/90 backdrop-blur-xl z-[200] flex items-center justify-center p-6 animate-fade uppercase font-black">
                                <div className="glass-bubble p-12 rounded-[4rem] w-full max-w-sm shadow-2xl">
                                    <h3 className="text-2xl font-black mb-1 text-amber-600 uppercase">Add Extra Hours</h3>
                                    <p className="text-slate-500 text-xs font-black mb-1 uppercase tracking-widest">{staffName}</p>
                                    <p className="text-slate-400 text-[10px] font-bold mb-8">
                                        Current checkout: <span className="text-slate-600 font-black">{log.check_out ? new Date(log.check_out).toLocaleString() : 'Live shift'}</span>
                                    </p>
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[9px] ml-4 text-slate-400 uppercase">+ Hours</label>
                                                <input type="number" min="0" max="24" placeholder="0" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] font-black outline-none border-slate-100 focus:border-amber-400 text-2xl text-center" value={extraHours} onChange={e => setExtraHours(e.target.value)} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[9px] ml-4 text-slate-400 uppercase">+ Minutes</label>
                                                <input type="number" min="0" max="59" placeholder="0" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] font-black outline-none border-slate-100 focus:border-amber-400 text-2xl text-center" value={extraMinutes} onChange={e => setExtraMinutes(e.target.value)} />
                                            </div>
                                        </div>
                                        {newCheckout && (
                                            <div className="bg-amber-50 border-2 border-amber-100 rounded-[2rem] p-5 space-y-3">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-[10px] text-amber-500 font-black uppercase">New Checkout</span>
                                                    <span className="text-sm font-black text-amber-700">{newCheckout.toLocaleString()}</span>
                                                </div>
                                                <div className="flex justify-between items-center border-t border-amber-100 pt-3">
                                                    <span className="text-[10px] text-amber-500 font-black uppercase">Extra Pay</span>
                                                    <span className="text-xl font-black text-amber-600">+ Rs. {extraPay}</span>
                                                </div>
                                            </div>
                                        )}
                                        <div className="flex gap-4 pt-4">
                                            <button onClick={() => { setExtraHoursModal(null); setExtraHours(''); setExtraMinutes(''); }} className="flex-1 text-slate-400 uppercase text-xs tracking-widest">Cancel</button>
                                            <button
                                                onClick={async () => {
                                                    if (extraSecs <= 0) { showToast('Enter valid hours/minutes', 'error'); return; }
                                                    const { error } = await sb.from('attendance')
                                                        .update({ check_out: newCheckout.toISOString() })
                                                        .eq('id', log.id);
                                                    if (error) { showToast('Failed to add extra hours', 'error'); return; }
                                                    // Mark as recently edited so auto-checkout doesn't override
                                                    recentEditsRef.current[log.id] = new Date().toISOString();
                                                    showToast(`Extra hours added for ${staffName}`, 'success');
                                                    playSfx('success');
                                                    setExtraHoursModal(null);
                                                    setExtraHours('');
                                                    setExtraMinutes('');
                                                }}
                                                className="flex-1 py-6 bg-amber-500 text-white font-black rounded-[2rem] btn-3d shadow-[0_6px_0_#92400e] uppercase text-xs">
                                                Apply
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* EDIT LOG MODAL */}
                    {editLog && (
                        <div className="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-xl z-[200] flex items-center justify-center p-6 animate-fade uppercase font-black">
                            <div className="glass-bubble p-12 rounded-[4rem] w-full max-w-lg shadow-2xl">
                                <h3 className="text-3xl font-black mb-10 text-[#8b0000] uppercase tracking-tighter">Override Shift</h3>
                                <div className="space-y-10 text-left font-black uppercase">
                                    <div className="space-y-2">
                                        <label className="text-[9px] ml-4 text-slate-400 uppercase">Clock-In Timestamp</label>
                                        <input type="datetime-local" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] outline-none font-black"
                                            value={toLocalISO(editLog.check_in)}
                                            onChange={e => setEditLog({...editLog, check_in: new Date(e.target.value).toISOString()})} />
                                    </div>
                                    <div className="space-y-2 font-black">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[9px] ml-4 text-slate-400 uppercase">Clock-Out Timestamp</label>
                                            {editLog.check_out && (
                                                <button onClick={() => setEditLog({...editLog, check_out: null})} className="text-[9px] text-red-500 uppercase font-black underline">Return to Live</button>
                                            )}
                                        </div>
                                        <input type="datetime-local" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] outline-none font-black"
                                            value={editLog.check_out ? toLocalISO(editLog.check_out) : ''}
                                            onChange={e => setEditLog({...editLog, check_out: e.target.value ? new Date(e.target.value).toISOString() : null})} />
                                    </div>
                                    <div className="flex gap-6 pt-6 font-black">
                                        <button onClick={() => setEditLog(null)} className="flex-1 text-slate-400 uppercase text-xs">Discard</button>
                                        <button onClick={async () => {
                                            const { error } = await sb.from('attendance').update({ check_in: editLog.check_in, check_out: editLog.check_out }).eq('id', editLog.id);
                                            if (error) { showToast('Failed to update record', 'error'); return; }
                                            // Mark as recently edited so auto-checkout doesn't override
                                            recentEditsRef.current[editLog.id] = new Date().toISOString();
                                            setEditLog(null);
                                            showToast('Record updated', 'success');
                                            playSfx('success');
                                        }} className="flex-1 py-6 bg-indigo-600 text-white font-black rounded-[2.5rem] btn-3d uppercase text-xs shadow-[0_6px_0px_#3730a3]">Update Record</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    {creditModal && (
    <div className="fixed inset-0 bg-black/90 backdrop-blur-xl z-[200] flex items-center justify-center p-6 animate-fade uppercase font-black">
        <div className="glass-bubble p-12 rounded-[4rem] w-full max-w-sm shadow-2xl">
            <h3 className={`text-2xl font-black mb-1 uppercase ${creditModal.type === 'loan' ? 'text-amber-600' : 'text-emerald-600'}`}>
                {creditModal.type === 'loan' ? 'Lend Money' : 'Record Repayment'}
            </h3>
            <p className="text-slate-500 text-xs font-black mb-8 uppercase tracking-widest">{creditModal.employee.full_name}</p>
            <div className="space-y-4">
                <div className="space-y-1">
                    <label className="text-[9px] ml-4 text-slate-400 uppercase">Amount (PKR)</label>
                    <input type="number" min="0" placeholder="0" className="w-full p-6 bg-slate-50 border-2 rounded-[2rem] font-black outline-none border-slate-100 text-2xl text-center" value={creditAmount} onChange={e => setCreditAmount(e.target.value)} />
                </div>
                <div className="space-y-1">
                    <label className="text-[9px] ml-4 text-slate-400 uppercase">Note (optional)</label>
                    <input placeholder="Reason" className="w-full p-5 bg-slate-50 border-2 rounded-[2rem] font-black outline-none border-slate-100 text-sm" value={creditNote} onChange={e => setCreditNote(e.target.value)} />
                </div>
                <div className="flex gap-4 pt-4">
                    <button onClick={() => setCreditModal(null)} className="flex-1 text-slate-400 uppercase text-xs">Cancel</button>
                    <button
                        onClick={async () => {
                            const amt = parseFloat(creditAmount);
                            if (!amt || amt <= 0) { showToast('Enter a valid amount', 'error'); return; }
                            const signedAmount = creditModal.type === 'loan' ? amt : -amt;
                            const { error } = await sb.from('credits').insert([{ employee_id: creditModal.employee.id, amount: signedAmount, type: creditModal.type, note: creditNote || null }]);
                            if (error) { showToast('Failed to save entry', 'error'); return; }
                            showToast(`${creditModal.type === 'loan' ? 'Loan' : 'Repayment'} recorded`, 'success');
                            playSfx('success');
                            setCreditModal(null);
                        }}
                        className={`flex-1 py-6 text-white font-black rounded-[2rem] btn-3d uppercase text-xs ${creditModal.type === 'loan' ? 'bg-amber-500 shadow-[0_6px_0_#92400e]' : 'bg-emerald-500 shadow-[0_6px_0_#065f46]'}`}>
                        Confirm
                    </button>
                </div>
            </div>
        </div>
    </div>
)}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
